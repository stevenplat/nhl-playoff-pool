// ── POOL HERO ──
function PoolHero({user,myEntry,scored,bracket,onGoToPicks}){
  const pickerCount=scored.filter(u=>u.picks).length;
  const r=myEntry?.rank;
  const suffix=r===1?'st':r===2?'nd':r===3?'rd':'th';
  const rankText=r?`${r}${suffix} of ${pickerCount}`:bracket.status==='open'?'No picks submitted yet':'';
  const logos=React.useMemo(()=>pickRandom4(),[]);
  return(
    <div className="pool-hero">
      {logos.map((l,i)=>(
        <div key={i} className={`hero-logo hero-logo-${i+1}`} style={{background:l.glow.replace(/[\d.]+\)$/,'1)'),boxShadow:`0 0 32px 10px ${l.glow.replace(/[\d.]+\)$/,a=>+(+a.slice(0,-1)/2).toFixed(2)+')')}, 0 0 80px 30px ${l.glowFar.replace(/[\d.]+\)$/,a=>+(+a.slice(0,-1)/2).toFixed(2)+')')}`}}>
          <img src={l.src} style={{width:56,height:56,objectFit:'contain'}}/>
        </div>
      ))}
      <div className="pool-hero-name">{user.username}</div>
      {rankText&&<div className="pool-hero-meta">{rankText}</div>}
      {!user.picks&&bracket.status==='open'&&(
        <button className="btn btn-ghost btn-sm" style={{marginTop:16,position:'relative',zIndex:2,borderColor:'rgba(255,255,255,0.2)',color:'rgba(255,255,255,0.7)'}} onClick={onGoToPicks}>Make Your Picks →</button>
      )}
    </div>
  );
}

// ── POOL VIEW (score + standings + rules) ──
function PoolView({user,data,onRefresh,onGoToPicks}){
  const {bracket}=data;
  const myScore=calcScore(user.picks,bracket.results);
  const maxAvail=calcMaxAvail(bracket.results);
  const stMap={setup:{label:'Setting Up',type:'setup'},open:{label:'Open for Picks',type:'open'},locked:{label:'Picks Locked',type:'locked'},complete:{label:'Complete',type:'complete'}};
  const st=stMap[bracket.status]||stMap.setup;

  // build ranked list: pickers first (by score desc), non-pickers after
  let rk=0;
  const scored=[...data.users]
    .map(u=>({...u,score:calcScore(u.picks,bracket.results)}))
    .sort((a,b)=>{if(!a.picks&&!b.picks)return 0;if(!a.picks)return 1;if(!b.picks)return-1;return b.score-a.score;})
    .map(u=>{if(u.picks)rk++;return{...u,rank:u.picks?rk:null};});
  const myEntry=scored.find(u=>u.id===user.id);

  const bd=u=>{if(!u.picks)return Array(4).fill(null);return[['r1',8],['r2',4],['r3',2],['r4',1]].map(([k,n],ri)=>{let s=0,bonus=0;for(let i=0;i<n;i++){const res=bracket.results[k]?.[i],pk=u.picks[k]?.[i];if(res&&pk&&res.winner&&pk.winner===res.winner){s+=ROUND_PTS[ri];if(pk.length&&res.length&&pk.length===res.length)bonus+=SERIES_BONUS;}}return{pts:s,bonus};});};
  const rankIcon=r=>r===1?'🥇':r===2?'🥈':r===3?'🥉':r;

  return(
    <>
    <PoolHero user={user} myEntry={myEntry} scored={scored} bracket={bracket} onGoToPicks={onGoToPicks}/>
    <div className="page">
      <div className="hero-card">
        <div className="hero-label">Your Score · {bracket.season}</div>
        <div className="hero-score">{user.picks?myScore:'—'}</div>
        <div className="hero-sub">
          {user.picks
            ?`${maxAvail} pts available so far`
            :bracket.status==='open'?"Submit your picks to appear on the board":'Picks not yet open'}
        </div>
      </div>

      <div className="flex gap-2 mb-3 flex-wrap">
        <div className="stat-pill"><div className="stat-value"><span className={`badge badge-${st.type}`}>{st.label}</span></div><div className="stat-label">Status</div></div>
      </div>

      <div className="card mb-3">
        <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
          <div className="card-title" style={{marginBottom:0}}>Standings</div>
          {maxAvail>0&&<div className="text-xs text-dim2">Available so far: <strong style={{color:'var(--text2)'}}>{maxAvail} pts</strong></div>}
        </div>
        {scored.every(u=>!u.picks)
          ?<div className="empty-state"><h3>No picks yet</h3><p className="text-xs">Scores appear once picks are submitted.</p></div>
          :<div className="table-wrap"><table>
            <thead><tr><th>#</th><th>Player</th><th className="text-right">Score</th><th className="text-right">R1</th><th className="text-right">R2</th><th className="text-right">Conf</th><th className="text-right">Cup</th><th className="text-right">Bonus</th></tr></thead>
            <tbody>{scored.map(u=>{
              const b=bd(u);const tb=b.filter(Boolean).reduce((a,x)=>a+x.bonus,0);const hasAv=u.avatar!=null;
              return(<tr key={u.id} className={u.id===user.id?'my-row':''}>
                <td><strong className={u.rank===1?'lb-rank-1':u.rank===2?'lb-rank-2':u.rank===3?'lb-rank-3':''}>{u.rank?rankIcon(u.rank):'—'}</strong></td>
                <td>
                  <div className="flex items-center gap-2">
                    <div style={{width:26,height:26,borderRadius:'50%',background:hasAv?AVATAR_LIST[u.avatar]?.bg:'#7c5cfc',overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:hasAv?0:'0.65rem',fontWeight:800,color:'#fff'}}>
                      {hasAv?<AvatarSvg id={u.avatar}/>:u.username[0]?.toUpperCase()}
                    </div>
                    <span style={{fontWeight:600}}>{u.username}{u.id===user.id&&<span className="text-dim2 text-xs"> (you)</span>}{!u.picks&&<span className="text-dim2 text-xs"> · no picks</span>}</span>
                  </div>
                </td>
                <td className="text-right"><strong style={{color:'var(--gold)',fontSize:'1.05rem'}}>{u.picks?u.score:'—'}</strong></td>
                {b.map((r,ri)=><td key={ri} className="text-right text-dim2">{r?r.pts||'—':'—'}</td>)}
                <td className="text-right" style={{color:'var(--green)',fontWeight:700}}>{tb>0?`+${tb}`:'—'}</td>
              </tr>);
            })}</tbody>
          </table></div>
        }
      </div>

      <div className="card">
        <div className="card-title">Scoring Rules</div>
        {[['First Round','10'],['Second Round','25'],['Conference Finals','50'],['Stanley Cup Final','100']].map(([r,p])=>(
          <div key={r} className="scoring-row"><span className="text-dim">{r}</span><span className="pts-chip">{p} pts</span></div>
        ))}
        <div className="scoring-row" style={{borderTop:'1px solid var(--border)',marginTop:8,paddingTop:8}}>
          <span className="text-dim">Correct series length</span>
          <span style={{background:'rgba(34,197,94,0.12)',color:'var(--green)',fontWeight:800,fontSize:'0.82rem',padding:'3px 10px',borderRadius:'20px'}}>+3 pts</span>
        </div>
        <div className="scoring-row"><span className="text-dim">Maximum possible</span><span className="pts-chip">425 pts</span></div>
      </div>
    </div>
    </>
  );
}

// ── SERIES PICKER ──
function SeriesPicker({label,team1,team2,pick,onChange,disabled,result}){
  if(!team1||!team2)return<div className="matchup"><div className="matchup-header"><span>{label}</span></div><div style={{padding:'16px',color:'var(--text3)',fontSize:'0.83rem'}}>Teams not yet set</div></div>;
  const hasResult=result?.winner;
  function teamClass(t){if(!hasResult)return pick?.winner===t?'selected':'';if(result.winner===t)return 'winner-real';return 'loser-real';}
  function dotClass(t){if(!pick?.winner||pick.winner!==t)return '';if(!hasResult)return 'picked';return result.winner===t?'correct':'wrong';}
  function dotChar(t){if(pick?.winner!==t)return '';if(!hasResult)return '✓';return result.winner===t?'✓':'✕';}
  return(
    <div className="matchup">
      <div className="matchup-header"><span>{label}</span>{hasResult&&<span style={{color:'var(--green)',fontWeight:700,fontSize:'0.72rem'}}>✓ {result.winner} in {result.length}</span>}</div>
      {[team1,team2].map(t=><div key={t} className={`matchup-team ${teamClass(t)}`} onClick={()=>!disabled&&onChange({...pick,winner:t})}><span className="team-name">{t}</span><div className={`pick-dot ${dotClass(t)}`}>{dotChar(t)}</div></div>)}
      {!disabled&&pick?.winner&&<div className="length-picker"><span className="length-label">Games:</span>{[4,5,6,7].map(n=><button key={n} className={`length-btn${pick?.length===n?' active':''}`} onClick={()=>onChange({...pick,length:n})}>{n}</button>)}</div>}
      {disabled&&pick?.winner&&<div className="length-picker"><span className="length-label">Your pick:</span><span style={{color:'var(--text)',fontSize:'0.85rem',fontWeight:600}}>{pick.winner}</span>{pick.length&&<span className="text-dim2 text-xs">in {pick.length}</span>}</div>}
    </div>
  );
}

// ── MY PICKS (WIZARD) ──
function MyPicksPage({user,data,onSavePicks}){
  const {bracket}=data;
  const locked=bracket.status==='locked'||bracket.status==='complete';
  const setup=bracket.status==='setup';
  const init=()=>user.picks||{r1:Array(8).fill(null),r2:Array(4).fill(null),r3:Array(2).fill(null),r4:Array(1).fill(null)};
  const [picks,setPicks]=useState(init);
  const [step,setStep]=useState(0);
  const [saving,setSaving]=useState(false);
  const [mode,setMode]=useState(user.picks?'overview':'wizard'); // 'wizard'|'overview'
  const [lockedTab,setLockedTab]=useState('r1');
  useEffect(()=>{setPicks(init());setStep(0);setMode(user.picks?'overview':'wizard');},[user.id,!!user.picks]);

  const r2t=r2Teams(picks,bracket.round1);
  const r3t=r3Teams(picks);
  const r4t=r4Teams(picks);

  const STEPS=[
    {round:'r1',idx:0,roundLabel:'Round 1',conf:'Eastern Conference',team1:bracket.round1[0]?.team1,team2:bracket.round1[0]?.team2},
    {round:'r1',idx:1,roundLabel:'Round 1',conf:'Eastern Conference',team1:bracket.round1[1]?.team1,team2:bracket.round1[1]?.team2},
    {round:'r1',idx:2,roundLabel:'Round 1',conf:'Eastern Conference',team1:bracket.round1[2]?.team1,team2:bracket.round1[2]?.team2},
    {round:'r1',idx:3,roundLabel:'Round 1',conf:'Eastern Conference',team1:bracket.round1[3]?.team1,team2:bracket.round1[3]?.team2},
    {round:'r1',idx:4,roundLabel:'Round 1',conf:'Western Conference',team1:bracket.round1[4]?.team1,team2:bracket.round1[4]?.team2},
    {round:'r1',idx:5,roundLabel:'Round 1',conf:'Western Conference',team1:bracket.round1[5]?.team1,team2:bracket.round1[5]?.team2},
    {round:'r1',idx:6,roundLabel:'Round 1',conf:'Western Conference',team1:bracket.round1[6]?.team1,team2:bracket.round1[6]?.team2},
    {round:'r1',idx:7,roundLabel:'Round 1',conf:'Western Conference',team1:bracket.round1[7]?.team1,team2:bracket.round1[7]?.team2},
    {round:'r2',idx:0,roundLabel:'Round 2',conf:'Eastern Conference',team1:r2t[0].team1,team2:r2t[0].team2},
    {round:'r2',idx:1,roundLabel:'Round 2',conf:'Eastern Conference',team1:r2t[1].team1,team2:r2t[1].team2},
    {round:'r2',idx:2,roundLabel:'Round 2',conf:'Western Conference',team1:r2t[2].team1,team2:r2t[2].team2},
    {round:'r2',idx:3,roundLabel:'Round 2',conf:'Western Conference',team1:r2t[3].team1,team2:r2t[3].team2},
    {round:'r3',idx:0,roundLabel:'Conference Final',conf:'Eastern Conference',team1:r3t[0].team1,team2:r3t[0].team2},
    {round:'r3',idx:1,roundLabel:'Conference Final',conf:'Western Conference',team1:r3t[1].team1,team2:r3t[1].team2},
    {round:'r4',idx:0,roundLabel:'🏆 Stanley Cup Final',conf:'',team1:r4t[0].team1,team2:r4t[0].team2},
  ];
  const totalSteps=STEPS.length;
  const cur=STEPS[Math.min(step,totalSteps-1)];
  const curPick=picks[cur.round]?.[cur.idx];
  const completedCount=STEPS.filter(s=>picks[s.round]?.[s.idx]?.winner&&picks[s.round]?.[s.idx]?.length).length;
  const allDone=completedCount===totalSteps;

  function setPick(round,idx,val){setPicks(p=>{const n={...p,[round]:[...p[round]]};n[round][idx]=val;return n;});}
  function handleTeamClick(team){if(!team)return;setPick(cur.round,cur.idx,{...(curPick||{}),winner:team,length:(curPick?.length)||null});}
  function handleGamesClick(n){
    setPick(cur.round,cur.idx,{...(curPick||{}),length:n});
    if(step<totalSteps-1)setTimeout(()=>setStep(s=>s+1),350);
  }
  async function handleFinish(){setSaving(true);await onSavePicks(picks);setSaving(false);setMode('overview');}

  const logoSrc=name=>`Assets/League=NHL, Team=${name}.png`;
  const isLastStep=step===totalSteps-1;

  // shared team card renderer
  function TeamCard({team,ti,isSel,isOther,accent,onClick}){
    return(
      <div onClick={onClick}
           style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:10,
             padding:'28px 12px 20px',borderRadius:14,
             cursor:team?'pointer':'default',userSelect:'none',
             background:isSel?`rgba(${accent},0.1)`:'var(--bg2)',
             border:isSel?`2px solid rgb(${accent})`:'1px solid var(--border)',
             opacity:isOther?0.28:1,
             transition:'all .18s ease',
             transform:isSel?'scale(1.03)':'scale(1)',
           }}>
        {team?(
          <>
            <img src={logoSrc(team)} style={{width:80,height:80,objectFit:'contain'}} onError={e=>{e.target.style.display='none';}}/>
            <div style={{fontSize:'0.85rem',fontWeight:700,textAlign:'center',color:'var(--text)',lineHeight:1.3}}>{team}</div>
            {isSel&&<div style={{fontSize:'0.6rem',fontWeight:700,color:`rgb(${accent})`,textTransform:'uppercase',letterSpacing:'1px',marginTop:2}}>Selected ✓</div>}
          </>
        ):(
          <div style={{color:'var(--text3)',fontSize:'0.8rem',height:80,display:'flex',alignItems:'center',justifyContent:'center'}}>TBD</div>
        )}
      </div>
    );
  }

  if(setup)return(
    <div className="page">
      <div className="page-title">My Bracket</div>
      <div className="empty-state" style={{padding:'80px 24px'}}>
        <div style={{fontSize:'3rem',marginBottom:16}}>🏒</div>
        <h3>Pool is being set up</h3>
        <p className="text-xs" style={{marginTop:8}}>The commissioner is configuring the bracket. Check back soon.</p>
      </div>
    </div>
  );

  if(locked){
    const ltabs=[{key:'r1',label:'Round 1'},{key:'r2',label:'Round 2'},{key:'r3',label:'Conf Finals'},{key:'r4',label:'Cup Final'}];
    return(
      <div className="page">
        <div className="page-title" style={{marginBottom:16}}>My Bracket</div>
        <Alert type="warn">Picks are locked — this is your submitted bracket.</Alert>
        <div className="tabs" style={{marginTop:16}}>{ltabs.map(t=><button key={t.key} className={`tab${lockedTab===t.key?' active':''}`} onClick={()=>setLockedTab(t.key)}>{t.label}</button>)}</div>
        {lockedTab==='r1'&&<><div className="conf-label">Eastern Conference</div><div className="grid-2 mb-3">{[0,1,2,3].map(i=><SeriesPicker key={i} label={`East Series ${i+1}`} team1={bracket.round1[i].team1} team2={bracket.round1[i].team2} pick={picks.r1[i]} onChange={()=>{}} disabled result={bracket.results.r1[i]}/>)}</div><div className="conf-label">Western Conference</div><div className="grid-2">{[4,5,6,7].map((i,n)=><SeriesPicker key={i} label={`West Series ${n+1}`} team1={bracket.round1[i].team1} team2={bracket.round1[i].team2} pick={picks.r1[i]} onChange={()=>{}} disabled result={bracket.results.r1[i]}/>)}</div></>}
        {lockedTab==='r2'&&<><div className="conf-label">Eastern Conference</div><div className="grid-2 mb-3">{[0,1].map(i=><SeriesPicker key={i} label={r2t[i].label} team1={r2t[i].team1} team2={r2t[i].team2} pick={picks.r2[i]} onChange={()=>{}} disabled result={bracket.results.r2[i]}/>)}</div><div className="conf-label">Western Conference</div><div className="grid-2">{[2,3].map(i=><SeriesPicker key={i} label={r2t[i].label} team1={r2t[i].team1} team2={r2t[i].team2} pick={picks.r2[i]} onChange={()=>{}} disabled result={bracket.results.r2[i]}/>)}</div></>}
        {lockedTab==='r3'&&<div className="grid-2">{[0,1].map(i=><SeriesPicker key={i} label={r3t[i].label} team1={r3t[i].team1} team2={r3t[i].team2} pick={picks.r3[i]} onChange={()=>{}} disabled result={bracket.results.r3[i]}/>)}</div>}
        {lockedTab==='r4'&&<div style={{maxWidth:440,margin:'0 auto'}}><SeriesPicker label={r4t[0].label} team1={r4t[0].team1} team2={r4t[0].team2} pick={picks.r4[0]} onChange={()=>{}} disabled result={bracket.results.r4[0]}/></div>}
      </div>
    );
  }

  // ── OVERVIEW (BRACKET TREE) ──
  if(mode==='overview'){
    // Layout constants
    const CW=136, CH=82, WG=10, PG=20, RG=20, CupW=152;
    const PH=CH*2+WG;          // 174 — height of one R1 pair
    const TH=PH*2+PG;          // 368 — total bracket height

    // Column x positions (West → Cup → East)
    const wR1x=0, wR2x=CW+RG, wCFx=wR2x+CW+RG;
    const cupX=wCFx+CW+RG;
    const eCFx=cupX+CupW+RG, eR2x=eCFx+CW+RG, eR1x=eR2x+CW+RG;
    const totalBW=eR1x+CW;

    // Y positions (top of each card)
    // West R1 order: R1[4], R1[7], R1[5], R1[6]  (seeded: D1,WC,D2,D3)
    const r1y=[0, CH+WG, PH+PG, PH+PG+CH+WG];
    const r2y=[PH/2-CH/2, PH+PG+PH/2-CH/2]; // centered in each pair
    const cfY=TH/2-CH/2;                      // centered in full height
    const cY=y=>y+CH/2;                       // center of a card at top y

    // Build SVG connector lines
    const lines=[];
    const L=(x1,y1,x2,y2)=>lines.push([x1,y1,x2,y2]);
    const bracketConn=(topY,botY,edgeX,r2Y,r2EdgeX)=>{
      const mx=(edgeX+r2EdgeX)/2;
      L(edgeX,cY(topY),mx,cY(topY));
      L(edgeX,cY(botY),mx,cY(botY));
      L(mx,cY(topY),mx,cY(botY));
      L(mx,cY(r2Y),r2EdgeX,cY(r2Y));
    };

    // West side (left→right)
    bracketConn(r1y[0],r1y[1],wR1x+CW,r2y[0],wR2x);   // R1[4,7] → R2[2]
    bracketConn(r1y[2],r1y[3],wR1x+CW,r2y[1],wR2x);   // R1[5,6] → R2[3]
    bracketConn(r2y[0],r2y[1],wR2x+CW,cfY,wCFx);      // R2[2,3] → West CF
    L(wCFx+CW,cY(cfY),cupX,cY(cfY));                   // West CF → Cup

    // East side (right→left, same logic since L() is directionless)
    bracketConn(r1y[0],r1y[1],eR1x,r2y[0],eR2x+CW);   // R1[0,3] → R2[0]
    bracketConn(r1y[2],r1y[3],eR1x,r2y[1],eR2x+CW);   // R1[1,2] → R2[1]
    bracketConn(r2y[0],r2y[1],eR2x,cfY,eCFx+CW);      // R2[0,1] → East CF
    L(eCFx,cY(cfY),cupX+CupW,cY(cfY));                 // East CF → Cup

    // Bracket card component
    const BCard=({t1,t2,pick,res,gold=false})=>{
      const winner=pick?.winner, actual=res?.winner;
      const isTBD=t=>!t||t.includes('Winner')||t.includes('Champ')||t==='TBD';
      const row=(team,isTop)=>{
        const safe=team||'TBD', tbd=isTBD(safe);
        const isPicked=!tbd&&winner===safe;
        const isWin=actual===safe;
        const isLose=actual&&actual!==safe;
        return(
          <div style={{
            flex:1,display:'flex',alignItems:'center',gap:5,padding:'0 7px',
            borderBottom:isTop?`1px solid ${gold?'rgba(245,166,35,0.15)':'var(--border)'}`:'none',
            background:isWin?(gold?'rgba(245,166,35,0.18)':'rgba(52,211,153,0.07)'):isPicked?(gold?'rgba(245,166,35,0.1)':'rgba(124,92,252,0.08)'):'transparent',
            opacity:isLose?0.28:1,transition:'opacity .15s',
          }}>
            {!tbd&&<img src={logoSrc(safe)} style={{width:18,height:18,objectFit:'contain',flexShrink:0}} onError={e=>{e.target.style.display='none';}}/>}
            <span style={{
              fontSize:'0.68rem',flex:1,fontWeight:isPicked||isWin?700:400,
              color:isWin?(gold?'#f5a623':'var(--green)'):isPicked?'var(--text)':'var(--text3)',
              overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
            }}>{safe}</span>
            {isPicked&&pick?.length&&winner===safe&&<span style={{fontSize:'0.52rem',color:gold?'rgba(245,166,35,0.6)':'var(--text3)',flexShrink:0,marginLeft:2}}>·{pick.length}</span>}
            {isPicked&&!actual&&<span style={{fontSize:'0.5rem',color:gold?'#f5a623':'var(--purple)',fontWeight:700,flexShrink:0,marginLeft:2}}>✓</span>}
            {isWin&&<span style={{fontSize:'0.5rem',color:gold?'#f5a623':'var(--green)',fontWeight:700,flexShrink:0,marginLeft:2}}>✓</span>}
          </div>
        );
      };
      return(
        <div style={{
          width:CW,height:CH,background:'var(--bg2)',
          border:`1px solid ${gold?'rgba(245,166,35,0.3)':winner?'rgba(124,92,252,0.25)':'var(--border)'}`,
          borderRadius:8,overflow:'hidden',display:'flex',flexDirection:'column',
        }}>
          {row(t1,true)}{row(t2,false)}
        </div>
      );
    };

    return(
      <div style={{padding:'28px 0 110px'}}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,padding:'0 20px'}}>
          <div className="page-title" style={{marginBottom:0}}>Your Picks</div>
          {bracket.status==='open'&&(
            <button className="btn btn-ghost btn-sm" onClick={()=>{setStep(0);setMode('wizard');}}>✏️ Edit Picks</button>
          )}
        </div>
        <div style={{background:'rgba(52,211,153,0.07)',border:'1px solid rgba(52,211,153,0.18)',borderRadius:8,padding:'10px 16px',marginBottom:24,display:'flex',alignItems:'center',gap:10,margin:'0 20px 24px'}}>
          <span style={{color:'var(--green)'}}>✓</span>
          <span style={{fontSize:'0.83rem',color:'var(--text2)'}}>{allDone?`All ${totalSteps} picks submitted.`:`${completedCount} of ${totalSteps} picks submitted.`}{bracket.status==='open'?' Edit until picks are locked.':''}</span>
        </div>

        {/* Scrollable bracket */}
        <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch',padding:'0 20px 12px'}}>
          <div style={{position:'relative',width:totalBW,height:TH+48,minWidth:totalBW}}>

            {/* Conference labels */}
            <div style={{position:'absolute',top:0,left:0,width:wCFx+CW,fontSize:'0.58rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text3)'}}>Western Conference</div>
            <div style={{position:'absolute',top:0,right:0,width:totalBW-eCFx,fontSize:'0.58rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text3)',textAlign:'right'}}>Eastern Conference</div>

            {/* Cards (offset by 18px for labels) */}
            <div style={{position:'absolute',top:18,left:0,width:totalBW,height:TH}}>

              {/* SVG connector lines */}
              <svg style={{position:'absolute',top:0,left:0,width:totalBW,height:TH,pointerEvents:'none'}}>
                {lines.map(([x1,y1,x2,y2],i)=>(
                  <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="rgba(255,255,255,0.1)" strokeWidth="1"/>
                ))}
              </svg>

              {/* West R1: [4,7,5,6] */}
              {[[4,r1y[0]],[7,r1y[1]],[5,r1y[2]],[6,r1y[3]]].map(([ri,y])=>(
                <div key={ri} style={{position:'absolute',left:wR1x,top:y}}>
                  <BCard t1={bracket.round1[ri]?.team1} t2={bracket.round1[ri]?.team2} pick={picks.r1[ri]} res={bracket.results.r1[ri]}/>
                </div>
              ))}

              {/* West R2: r2t[2], r2t[3] */}
              {[[2,r2y[0]],[3,r2y[1]]].map(([ri,y])=>(
                <div key={ri} style={{position:'absolute',left:wR2x,top:y}}>
                  <BCard t1={r2t[ri].team1} t2={r2t[ri].team2} pick={picks.r2[ri]} res={bracket.results.r2[ri]}/>
                </div>
              ))}

              {/* West CF: r3t[1] */}
              <div style={{position:'absolute',left:wCFx,top:cfY}}>
                <BCard t1={r3t[1].team1} t2={r3t[1].team2} pick={picks.r3[1]} res={bracket.results.r3[1]}/>
              </div>

              {/* Cup Final */}
              <div style={{
                position:'absolute',left:cupX,top:cfY,width:CupW,height:CH,
                background:'rgba(245,166,35,0.06)',border:'1px solid rgba(245,166,35,0.28)',
                borderRadius:8,overflow:'hidden',display:'flex',flexDirection:'column',
              }}>
                <div style={{padding:'2px 7px',fontSize:'0.5rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:'rgba(245,166,35,0.55)',background:'rgba(245,166,35,0.06)',borderBottom:'1px solid rgba(245,166,35,0.12)',flexShrink:0}}>🏆 Cup Final</div>
                <div style={{flex:1,display:'flex',flexDirection:'column'}}>
                  {[r4t[0].team1,r4t[0].team2].map((team,i)=>{
                    const winner=picks.r4[0]?.winner, actual=bracket.results.r4[0]?.winner;
                    const tbd=!team||team.includes('Champ');
                    const isPicked=!tbd&&winner===team;
                    const isWin=actual===team;
                    const isLose=actual&&actual!==team;
                    return(
                      <div key={i} style={{
                        flex:1,display:'flex',alignItems:'center',gap:5,padding:'0 7px',
                        borderBottom:i===0?'1px solid rgba(245,166,35,0.12)':'none',
                        background:isWin?'rgba(245,166,35,0.18)':isPicked?'rgba(245,166,35,0.1)':'transparent',
                        opacity:isLose?0.28:1,
                      }}>
                        {!tbd&&<img src={logoSrc(team)} style={{width:18,height:18,objectFit:'contain',flexShrink:0}} onError={e=>{e.target.style.display='none';}}/>}
                        <span style={{fontSize:'0.68rem',flex:1,fontWeight:isPicked||isWin?700:400,color:isWin?'#f5a623':isPicked?'var(--text)':'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{team||'TBD'}</span>
                        {isPicked&&!actual&&<span style={{fontSize:'0.5rem',color:'#f5a623',fontWeight:700,flexShrink:0}}>✓</span>}
                        {isWin&&<span style={{fontSize:'0.5rem',color:'#f5a623',fontWeight:700,flexShrink:0}}>✓</span>}
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* East CF: r3t[0] */}
              <div style={{position:'absolute',left:eCFx,top:cfY}}>
                <BCard t1={r3t[0].team1} t2={r3t[0].team2} pick={picks.r3[0]} res={bracket.results.r3[0]}/>
              </div>

              {/* East R2: r2t[0], r2t[1] */}
              {[[0,r2y[0]],[1,r2y[1]]].map(([ri,y])=>(
                <div key={ri} style={{position:'absolute',left:eR2x,top:y}}>
                  <BCard t1={r2t[ri].team1} t2={r2t[ri].team2} pick={picks.r2[ri]} res={bracket.results.r2[ri]}/>
                </div>
              ))}

              {/* East R1: [0,3,1,2] */}
              {[[0,r1y[0]],[3,r1y[1]],[1,r1y[2]],[2,r1y[3]]].map(([ri,y])=>(
                <div key={ri} style={{position:'absolute',left:eR1x,top:y}}>
                  <BCard t1={bracket.round1[ri]?.team1} t2={bracket.round1[ri]?.team2} pick={picks.r1[ri]} res={bracket.results.r1[ri]}/>
                </div>
              ))}
            </div>

            {/* Round labels at bottom */}
            {[
              {x:wR1x, w:CW, label:'Round 1'},
              {x:wR2x, w:CW, label:'Round 2'},
              {x:wCFx, w:CW, label:'Conf Final'},
              {x:cupX, w:CupW, label:'Cup Final', gold:true},
              {x:eCFx, w:CW, label:'Conf Final'},
              {x:eR2x, w:CW, label:'Round 2'},
              {x:eR1x, w:CW, label:'Round 1'},
            ].map(({x,w,label,gold})=>(
              <div key={x} style={{position:'absolute',bottom:0,left:x,width:w,textAlign:'center',fontSize:'0.55rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',color:gold?'rgba(245,166,35,0.5)':'var(--text3)'}}>
                {label}
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── TROPHY STEP (Stanley Cup Final) ──
  if(isLastStep){
    const goldAccent='245,166,35';
    return(
      <div style={{minHeight:'calc(100vh - 90px)',display:'flex',flexDirection:'column',alignItems:'center',paddingBottom:110}}>
        {/* Gold hero */}
        <div style={{width:'100%',background:'linear-gradient(180deg,rgba(245,166,35,0.18) 0%,transparent 100%)',display:'flex',flexDirection:'column',alignItems:'center',padding:'56px 24px 40px',textAlign:'center',borderBottom:'1px solid rgba(245,166,35,0.12)'}}>
          <div style={{fontSize:'5rem',lineHeight:1,marginBottom:20,filter:'drop-shadow(0 0 32px rgba(245,166,35,0.5))'}}>🏆</div>
          <div style={{fontSize:'0.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'3px',color:'rgba(245,166,35,0.7)',marginBottom:10}}>
            Stanley Cup Final
          </div>
          <div style={{fontSize:'1.5rem',fontWeight:700,color:'#fff',letterSpacing:'-0.5px'}}>Who wins the Cup?</div>
        </div>

        {/* Step dots */}
        <div style={{display:'flex',gap:4,marginTop:24,marginBottom:24,flexWrap:'wrap',justifyContent:'center',maxWidth:320,padding:'0 20px'}}>
          {STEPS.map((s,i)=>{
            const done=picks[s.round]?.[s.idx]?.winner&&picks[s.round]?.[s.idx]?.length;
            return <div key={i} style={{width:8,height:8,borderRadius:'50%',background:i===step?`rgb(${goldAccent})`:done?`rgba(${goldAccent},0.45)`:'var(--bg4)',flexShrink:0}}/>;
          })}
        </div>

        {/* Team cards */}
        <div style={{display:'flex',gap:10,width:'100%',maxWidth:500,padding:'0 20px',marginBottom:8}}>
          {[cur.team1,cur.team2].map((team,ti)=>{
            const isSel=curPick?.winner===team;
            const isOther=!!(curPick?.winner&&curPick.winner!==team);
            return <TeamCard key={team||ti} team={team} ti={ti} isSel={isSel} isOther={isOther} accent={goldAccent} onClick={()=>handleTeamClick(team)}/>;
          })}
        </div>
        <div style={{fontSize:'0.7rem',color:'rgba(245,166,35,0.5)',letterSpacing:'2px',fontWeight:600,marginBottom:24}}>vs</div>

        {/* Games picker */}
        <div style={{minHeight:72,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',marginBottom:32}}>
          {curPick?.winner?(
            <>
              <div style={{fontSize:'0.68rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1.5px',color:'rgba(245,166,35,0.6)',marginBottom:14}}>How many games?</div>
              <div style={{display:'flex',gap:10}}>
                {[4,5,6,7].map(n=>(
                  <button key={n} onClick={()=>setPick(cur.round,cur.idx,{...(curPick||{}),length:n})}
                          style={{width:54,height:54,borderRadius:12,fontSize:'1.1rem',fontWeight:700,
                            cursor:'pointer',fontFamily:'inherit',transition:'all .15s',
                            background:curPick?.length===n?`rgb(${goldAccent})`:'var(--bg3)',
                            color:curPick?.length===n?'#000':'var(--text2)',
                            border:curPick?.length===n?`2px solid rgb(${goldAccent})`:'1px solid var(--border)',
                            transform:curPick?.length===n?'scale(1.08)':'scale(1)',
                          }}>
                    {n}
                  </button>
                ))}
              </div>
            </>
          ):(
            <div style={{fontSize:'0.78rem',color:'rgba(245,166,35,0.5)',textAlign:'center'}}>Tap a team to pick the Cup champion</div>
          )}
        </div>

        {/* Finish button */}
        {curPick?.winner&&curPick?.length&&(
          <button onClick={handleFinish} disabled={saving}
                  style={{padding:'16px 48px',borderRadius:12,fontSize:'1rem',fontWeight:700,
                    cursor:'pointer',fontFamily:'inherit',transition:'all .2s',
                    background:`linear-gradient(135deg, rgb(${goldAccent}), #e8930a)`,
                    color:'#000',border:'none',
                    boxShadow:`0 4px 24px rgba(${goldAccent},0.4)`,
                    transform:saving?'scale(0.97)':'scale(1)',
                    marginBottom:16,
                  }}>
            {saving?'Saving…':'🏆 Finish'}
          </button>
        )}

        {/* Back */}
        <button className="btn btn-ghost btn-sm" onClick={()=>setStep(s=>s-1)} style={{color:'var(--text3)',marginTop:4}}>← Back</button>
      </div>
    );
  }

  // ── NORMAL WIZARD STEPS ──
  return(
    <div className="page" style={{maxWidth:540,paddingTop:28}}>

      {/* Progress bar */}
      <div style={{marginBottom:40}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <span style={{fontSize:'0.7rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text3)'}}>
            Series {step+1} of {totalSteps}
          </span>
          <span style={{fontSize:'0.7rem',color:'var(--text3)'}}>
            {completedCount}/{totalSteps} complete
          </span>
        </div>
        <div style={{height:3,background:'var(--bg3)',borderRadius:4,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${(completedCount/totalSteps)*100}%`,background:'var(--purple)',borderRadius:4,transition:'width .4s ease'}}/>
        </div>
        <div style={{display:'flex',gap:4,marginTop:10,flexWrap:'wrap'}}>
          {STEPS.map((s,i)=>{
            const done=picks[s.round]?.[s.idx]?.winner&&picks[s.round]?.[s.idx]?.length;
            return(
              <button key={i} onClick={()=>setStep(i)}
                style={{width:8,height:8,borderRadius:'50%',border:'none',padding:0,cursor:'pointer',flexShrink:0,
                  background:i===step?'var(--purple)':done?'rgba(124,92,252,0.4)':'var(--bg4)',
                  transition:'all .15s'}}>
              </button>
            );
          })}
        </div>
      </div>

      {/* Round label */}
      <div style={{textAlign:'center',marginBottom:28}}>
        <div style={{fontSize:'0.68rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'2px',color:'var(--text3)'}}>
          {cur.roundLabel}{cur.conf?` · ${cur.conf}`:''}
        </div>
      </div>

      {/* Team cards */}
      <div style={{display:'flex',gap:10,marginBottom:8}}>
        {[cur.team1,cur.team2].map((team,ti)=>{
          const isSel=curPick?.winner===team;
          const isOther=!!(curPick?.winner&&curPick.winner!==team);
          return <TeamCard key={team||ti} team={team} ti={ti} isSel={isSel} isOther={isOther} accent="124,92,252" onClick={()=>handleTeamClick(team)}/>;
        })}
      </div>

      {/* vs divider */}
      <div style={{textAlign:'center',marginBottom:28,fontSize:'0.7rem',color:'var(--text3)',letterSpacing:'2px',fontWeight:600}}>vs</div>

      {/* Games picker */}
      <div style={{minHeight:72,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',marginBottom:36}}>
        {curPick?.winner?(
          <>
            <div style={{fontSize:'0.68rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'1.5px',color:'var(--text3)',marginBottom:14}}>How many games?</div>
            <div style={{display:'flex',gap:10}}>
              {[4,5,6,7].map(n=>(
                <button key={n} onClick={()=>handleGamesClick(n)}
                        style={{width:54,height:54,borderRadius:12,fontSize:'1.1rem',fontWeight:700,
                          cursor:'pointer',fontFamily:'inherit',transition:'all .15s',
                          background:curPick?.length===n?'var(--purple)':'var(--bg3)',
                          color:curPick?.length===n?'#fff':'var(--text2)',
                          border:curPick?.length===n?'2px solid var(--purple)':'1px solid var(--border)',
                          transform:curPick?.length===n?'scale(1.08)':'scale(1)',
                        }}>
                  {n}
                </button>
              ))}
            </div>
          </>
        ):(
          <div style={{fontSize:'0.78rem',color:'var(--text3)',textAlign:'center'}}>Tap a team to pick the winner</div>
        )}
      </div>

      {/* Navigation */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <button className="btn btn-ghost" onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0} style={{minWidth:90}}>← Back</button>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {!curPick?.winner&&(
            <button className="btn btn-ghost btn-sm" onClick={()=>setStep(s=>s+1)} style={{color:'var(--text3)',fontSize:'0.72rem'}}>Skip</button>
          )}
          <button onClick={()=>setStep(s=>s+1)} disabled={!curPick?.winner}
                  style={{minWidth:90,padding:'9px 18px',borderRadius:8,fontSize:'0.85rem',fontWeight:600,
                    cursor:curPick?.winner?'pointer':'default',fontFamily:'inherit',transition:'all .15s',
                    background:curPick?.winner?'var(--purple)':'var(--bg3)',
                    color:curPick?.winner?'#fff':'var(--text3)',
                    border:'none',opacity:curPick?.winner?1:0.45}}>
            Next →
          </button>
        </div>
      </div>

      {/* Submit shortcut once all done */}
      {allDone&&(
        <div style={{marginTop:20,textAlign:'center'}}>
          <button className="btn btn-gold btn-sm" onClick={handleFinish} disabled={saving}>
            {saving?'Saving…':'Submit All Picks'}
          </button>
        </div>
      )}
    </div>
  );
}



// ── MANAGE USERS ──
function ManageUsersPage({data,onRefresh}){
  const [modal,setModal]=useState(null);const [form,setForm]=useState({username:'',password:'',is_admin:false});
  const [err,setErr]=useState('');const [msg,setMsg]=useState('');const [saving,setSaving]=useState(false);
  function openAdd(){setForm({username:'',password:'',is_admin:false});setErr('');setModal('add');}
  function openEdit(u){setForm({username:u.username,password:u.password,is_admin:u.is_admin});setErr('');setModal({editUser:u});}
  async function handleSubmit(){
    if(!form.username.trim()){setErr('Username required.');return;}
    if(!form.password||form.password.length<4){setErr('Password must be at least 4 characters.');return;}
    if(data.users.some(u=>u.username.toLowerCase()===form.username.toLowerCase().trim()&&(modal==='add'||u.id!==modal.editUser?.id))){setErr('Username taken.');return;}
    setSaving(true);setErr('');
    try{
      if(modal==='add'){await dbCreateUser({id:uid(),username:form.username.trim(),password:form.password,is_admin:form.is_admin,picks:null,pool_id:data.poolId,created_at:new Date().toISOString()});setMsg(`"${form.username.trim()}" created.`);}
      else{await dbUpdateUser(modal.editUser.id,{username:form.username.trim(),password:form.password,is_admin:form.is_admin});setMsg(`"${form.username.trim()}" updated.`);}
      await onRefresh();setModal(null);setTimeout(()=>setMsg(''),3000);
    }catch(e){setErr('Error: '+e.message);}finally{setSaving(false);}
  }
  async function handleDelete(u){if(!confirm(`Delete "${u.username}"?`))return;await dbDeleteUser(u.id);await onRefresh();setMsg(`"${u.username}" deleted.`);setTimeout(()=>setMsg(''),3000);}
  async function handleClear(u){if(!confirm(`Clear picks for "${u.username}"?`))return;await dbSavePicks(u.id,null);await onRefresh();setMsg('Picks cleared.');setTimeout(()=>setMsg(''),3000);}
  return(
    <div className="page">
      <div className="page-title">League Members</div>
      {msg&&<Alert type="success">{msg}</Alert>}
      <div className="card">
        <div className="flex justify-between items-center mb-3"><div className="card-title" style={{marginBottom:0}}>All Members ({data.users.length})</div><button className="btn btn-gold btn-sm" onClick={openAdd}>+ Add Member</button></div>
        <div className="table-wrap"><table><thead><tr><th>Username</th><th>Password</th><th>Role</th><th>Picks</th><th>Actions</th></tr></thead><tbody>
          {data.users.map(u=>(
            <tr key={u.id}><td style={{fontWeight:600}}>{u.username}</td>
            <td><span style={{background:'var(--bg3)',border:'1px solid var(--border)',padding:'3px 10px',borderRadius:'6px',fontFamily:'monospace',fontSize:'0.82rem',color:'var(--text2)'}}>{u.password}</span></td>
            <td><span className={`badge badge-${u.is_admin?'admin':'user'}`}>{u.is_admin?'Admin':'Member'}</span></td>
            <td>{u.picks?<span style={{color:'var(--green)',fontWeight:600,fontSize:'0.82rem'}}>✓ Submitted</span>:<span className="text-dim2 text-xs">—</span>}</td>
            <td><div className="flex gap-1 flex-wrap"><button className="btn btn-ghost btn-sm" onClick={()=>openEdit(u)}>Edit</button>{u.picks&&<button className="btn btn-ghost btn-sm" onClick={()=>handleClear(u)}>Clear</button>}{u.id!=='admin'&&<button className="btn btn-danger btn-sm" onClick={()=>handleDelete(u)}>Delete</button>}</div></td>
            </tr>
          ))}
        </tbody></table></div>
      </div>
      {modal&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <div className="modal-title">{modal==='add'?'Add New Member':'Edit Member'}</div>
            {err&&<Alert type="danger">{err}</Alert>}
            <div className="form-group"><label className="form-label">Username</label><input className="form-input" value={form.username} onChange={e=>setForm({...form,username:e.target.value})} autoFocus placeholder="e.g. johndoe"/></div>
            <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="text" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Min 4 characters"/></div>
            <div className="form-group flex items-center gap-2"><input type="checkbox" id="iad" checked={form.is_admin} onChange={e=>setForm({...form,is_admin:e.target.checked})} style={{accentColor:'var(--purple)',width:'16px',height:'16px',cursor:'pointer'}}/><label htmlFor="iad" style={{cursor:'pointer',fontSize:'0.88rem',color:'var(--text2)'}}>Admin privileges</label></div>
            <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-gold" onClick={handleSubmit} disabled={saving}>{saving?'Saving…':modal==='add'?'Create':'Save Changes'}</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── BRACKET SETUP ──
function BracketSetupPage({data,onRefresh}){
  const [bracket,setBracket]=useState(data.bracket);const [msg,setMsg]=useState('');const [msgType,setMsgType]=useState('success');
  const [saving,setSaving]=useState(false);const [importing,setImporting]=useState(false);
  useEffect(()=>{setBracket(data.bracket);},[data.bracket]);
  // Auto-import teams from NHL when bracket is empty
  useEffect(()=>{
    if(data.bracket.round1.some(s=>s.team1||s.team2))return; // already has teams
    async function autoImport(){
      try{
        const nhl=await nhlFetchPlayoff(data.bracket.season);
        const round1=nhlParseTeams(nhl.series);
        if(round1.some(s=>s.team1||s.team2)){
          setBracket(p=>({...p,round1}));
          await dbSaveConfig({...data.bracket,round1},data.poolId);
          await onRefresh();
          setMsg('Teams auto-imported from NHL.com.');setMsgType('success');
          setTimeout(()=>setMsg(''),4000);
        }
      }catch(e){ /* silent */ }
    }
    autoImport();
  },[]);
  function setTeam(idx,field,val){setBracket(p=>{const r1=[...p.round1];r1[idx]={...r1[idx],[field]:val};return{...p,round1:r1};});}
  async function handleSave(){
    setSaving(true);
    try{await dbSaveConfig(bracket,data.poolId);await onRefresh();setMsg('Bracket saved!');setMsgType('success');}
    catch(e){setMsg('Save failed: '+e.message);setMsgType('danger');}
    finally{setSaving(false);setTimeout(()=>setMsg(''),4000);}
  }
  async function handleStatusChange(newStatus){
    const updated={...bracket,status:newStatus};
    setBracket(updated);
    setSaving(true);
    const labels={setup:'Setup',open:'Open — accepting picks',locked:'Locked',complete:'Complete'};
    try{
      await dbSaveConfig(updated,data.poolId);
      await onRefresh();
      setMsg(`Status set to "${labels[newStatus]}" and saved.`);setMsgType('success');
    }catch(e){setMsg('Save failed: '+e.message);setMsgType('danger');}
    finally{setSaving(false);setTimeout(()=>setMsg(''),4000);}
  }
  async function handleImportNHL(){
    setImporting(true);setMsg('');
    try{
      const nhl=await nhlFetchPlayoff(bracket.season);
      const round1=nhlParseTeams(nhl.series);
      if(round1.some(s=>s.team1||s.team2)){
        setBracket(p=>({...p,round1}));
        setMsg(`Teams imported from NHL ${bracket.season} bracket — review and save.`);setMsgType('success');
      } else {
        setMsg('No teams found in NHL bracket yet. Check back when playoffs are announced.');setMsgType('warn');
      }
    }catch(e){setMsg(`NHL import failed: ${e.message}`);setMsgType('danger');}
    finally{setImporting(false);setTimeout(()=>setMsg(''),6000);}
  }
  const statusOpts=[{v:'setup',l:'Setup',d:'Not yet open'},{v:'open',l:'Open',d:'Accepting picks'},{v:'locked',l:'Locked',d:'No more picks'},{v:'complete',l:'Complete',d:'Season over'}];
  return(
    <div className="page">
      <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
        <div className="page-title" style={{marginBottom:0}}>⚙️ Bracket Setup</div>
        <button className="btn btn-ghost btn-sm" onClick={handleImportNHL} disabled={importing} style={{borderColor:'rgba(255,255,255,0.15)'}}>
          {importing?'Fetching…':'⬇ Import from NHL'}
        </button>
      </div>
      {msg&&<Alert type={msgType}>{msg}</Alert>}
      <Alert type="info">Enter the 16 playoff teams, then save the bracket. Changing the status saves immediately and takes effect for all players right away.</Alert>
      <div className="card mb-3">
        <div className="card-title">Season</div>
        <div className="flex gap-2 items-center">
          <input className="form-input" style={{maxWidth:120}} placeholder="e.g. 2025" value={bracket.season} onChange={e=>setBracket(p=>({...p,season:e.target.value}))}/>
          <span style={{color:'var(--text3)',fontSize:'0.82rem'}}>Used for NHL import — set to the year playoffs end (e.g. 2025 for the 2024-25 season)</span>
        </div>
      </div>
      <div className="card mb-3">
        <div className="card-title">Pool Status <span style={{fontSize:'0.72rem',fontWeight:400,color:'var(--text3)',marginLeft:6}}>— changes save instantly</span></div>
        <div className="flex gap-2 flex-wrap">{statusOpts.map(o=><button key={o.v} onClick={()=>handleStatusChange(o.v)} disabled={saving} style={{background:bracket.status===o.v?'var(--grad-purple)':'var(--bg3)',border:'1px solid',borderColor:bracket.status===o.v?'var(--purple)':'var(--border2)',color:bracket.status===o.v?'#fff':'var(--text2)',padding:'9px 18px',borderRadius:'10px',cursor:'pointer',fontSize:'0.86rem',fontWeight:600,fontFamily:'inherit'}}>{o.l} <span style={{opacity:0.7,fontWeight:400,fontSize:'0.78rem'}}>· {o.d}</span></button>)}</div>
      </div>
      <div className="grid-2">
        <div className="card"><div className="card-title">Eastern Conference — Round 1</div>{[0,1,2,3].map(i=><div key={i} style={{marginBottom:'16px'}}><div className="form-label">East Series {i+1}</div><div className="flex gap-2"><input className="form-input" placeholder="Higher seed" value={bracket.round1[i].team1} onChange={e=>setTeam(i,'team1',e.target.value)}/><input className="form-input" placeholder="Lower seed" value={bracket.round1[i].team2} onChange={e=>setTeam(i,'team2',e.target.value)}/></div></div>)}</div>
        <div className="card"><div className="card-title">Western Conference — Round 1</div>{[4,5,6,7].map((i,n)=><div key={i} style={{marginBottom:'16px'}}><div className="form-label">West Series {n+1}</div><div className="flex gap-2"><input className="form-input" placeholder="Higher seed" value={bracket.round1[i].team1} onChange={e=>setTeam(i,'team1',e.target.value)}/><input className="form-input" placeholder="Lower seed" value={bracket.round1[i].team2} onChange={e=>setTeam(i,'team2',e.target.value)}/></div></div>)}</div>
      </div>
      <div style={{textAlign:'right'}}><button className="btn btn-gold" onClick={handleSave} disabled={saving}>{saving?'Saving…':'💾 Save Bracket'}</button></div>
    </div>
  );
}

// ── RESULTS ──
function ResultsPage({data,onRefresh}){
  const [results,setResults]=useState(data.bracket.results);const [msg,setMsg]=useState('');const [msgType,setMsgType]=useState('success');
  const [saving,setSaving]=useState(false);const [syncing,setSyncing]=useState(false);
  const {bracket}=data;
  useEffect(()=>{setResults(data.bracket.results);},[data.bracket.results]);
  // Auto-sync from NHL on mount — fills in any newly completed series and saves
  useEffect(()=>{
    async function autoSync(){
      try{
        const nhl=await nhlFetchPlayoff(bracket.season);
        const synced=nhlParseResults(nhl.series);
        const newlyDone=Object.entries(synced).some(([k,arr])=>arr.some((s,i)=>s&&!data.bracket.results[k]?.[i]));
        if(newlyDone){
          const merged=Object.fromEntries(['r1','r2','r3','r4'].map(k=>[k,(synced[k]||[]).map((s,i)=>s||data.bracket.results[k]?.[i]||null)]));
          setResults(merged);
          await dbSaveConfig({...bracket,results:merged},data.poolId);
          await onRefresh();
          const count=Object.values(merged).flat().filter(Boolean).length;
          setMsg(`Auto-synced ${count} completed series from NHL.com.`);setMsgType('success');
          setTimeout(()=>setMsg(''),5000);
        }
      }catch(e){ /* silent — manual sync still available */ }
    }
    autoSync();
  },[]);
  function setResult(round,idx,field,val){setResults(p=>{const n={...p,[round]:[...p[round]]};n[round][idx]={...(n[round][idx]||{}),[field]:field==='length'?parseInt(val)||null:val};return n;});}
  async function handleSave(){
    setSaving(true);
    try{await dbSaveConfig({...bracket,results},data.poolId);await onRefresh();setMsg('Results saved! Scores updated.');setMsgType('success');}
    catch(e){setMsg('Save failed: '+e.message);setMsgType('danger');}
    finally{setSaving(false);setTimeout(()=>setMsg(''),3000);}
  }
  async function handleSyncNHL(){
    setSyncing(true);setMsg('');
    try{
      const nhl=await nhlFetchPlayoff(bracket.season);
      const synced=nhlParseResults(nhl.series);
      const completed=Object.values(synced).flat().filter(Boolean).length;
      if(completed===0){setMsg('No completed series found yet — check back once the playoffs start.');setMsgType('warn');}
      else{setResults(synced);await dbSaveConfig({...bracket,results:synced},data.poolId);await onRefresh();setMsg(`Synced ${completed} completed series from NHL.com. Scores updated.`);setMsgType('success');}
    }catch(e){setMsg(`NHL sync failed: ${e.message}`);setMsgType('danger');}
    finally{setSyncing(false);setTimeout(()=>setMsg(''),6000);}
  }
  const ar2=actualR2({...bracket,results});const ar3=actualR3({...bracket,results});const ar4=actualR4({...bracket,results});
  function ResultRow({round,idx,team1,team2,label}){
    const res=results[round]?.[idx]||{};const teams=[team1,team2].filter(t=>t&&!t.includes('Winner')&&!t.includes('Champ'));
    const isDone=!!res.winner;
    return(<div style={{marginBottom:'12px',padding:'14px',background:'var(--bg3)',borderRadius:'12px',border:`1px solid ${isDone?'rgba(34,197,94,0.2)':'var(--border)'}`}}><div className="form-label" style={{marginBottom:'10px',display:'flex',justifyContent:'space-between'}}><span>{label}</span>{isDone&&<span style={{color:'var(--green)',fontWeight:700,fontSize:'0.7rem'}}>✓ {res.winner} in {res.length}</span>}</div><div className="flex gap-2 flex-wrap"><div style={{flex:1,minWidth:'160px'}}><div className="form-label" style={{fontSize:'0.68rem'}}>Winner</div><select className="form-input" value={res.winner||''} onChange={e=>setResult(round,idx,'winner',e.target.value)}><option value="">— Not played —</option>{teams.length>0?teams.map(t=><option key={t} value={t}>{t}</option>):[<option key={team1} value={team1}>{team1}</option>,<option key={team2} value={team2}>{team2}</option>]}</select></div><div style={{width:'110px'}}><div className="form-label" style={{fontSize:'0.68rem'}}>Games</div><select className="form-input" value={res.length||''} onChange={e=>setResult(round,idx,'length',e.target.value)}><option value="">—</option>{[4,5,6,7].map(n=><option key={n} value={n}>{n}</option>)}</select></div></div></div>);
  }
  return(
    <div className="page">
      <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
        <div className="page-title" style={{marginBottom:0}}>📊 Results</div>
        <button className="btn btn-ghost btn-sm" onClick={handleSyncNHL} disabled={syncing} style={{borderColor:'rgba(255,255,255,0.15)'}}>
          {syncing?'Syncing…':'⟳ Sync from NHL'}
        </button>
      </div>
      {msg&&<Alert type={msgType}>{msg}</Alert>}
      <Alert type="info">Results auto-sync from NHL.com when this page loads. Use <strong>Sync from NHL</strong> to force a refresh, or enter results manually below.</Alert>
      <div className="grid-2"><div className="card"><div className="card-title">Round 1 — East</div>{[0,1,2,3].map(i=><ResultRow key={i} round="r1" idx={i} label={`East Series ${i+1}`} team1={bracket.round1[i].team1} team2={bracket.round1[i].team2}/>)}</div><div className="card"><div className="card-title">Round 1 — West</div>{[4,5,6,7].map((i,n)=><ResultRow key={i} round="r1" idx={i} label={`West Series ${n+1}`} team1={bracket.round1[i].team1} team2={bracket.round1[i].team2}/>)}</div></div>
      <div className="grid-2"><div className="card"><div className="card-title">Round 2 — East</div>{[0,1].map(i=><ResultRow key={i} round="r2" idx={i} label={ar2[i].label} team1={ar2[i].team1} team2={ar2[i].team2}/>)}</div><div className="card"><div className="card-title">Round 2 — West</div>{[2,3].map(i=><ResultRow key={i} round="r2" idx={i} label={ar2[i].label} team1={ar2[i].team1} team2={ar2[i].team2}/>)}</div></div>
      <div className="grid-2"><div className="card"><div className="card-title">Conference Finals</div>{[0,1].map(i=><ResultRow key={i} round="r3" idx={i} label={ar3[i].label} team1={ar3[i].team1} team2={ar3[i].team2}/>)}</div><div className="card"><div className="card-title">Stanley Cup Final</div><ResultRow round="r4" idx={0} label={ar4[0].label} team1={ar4[0].team1} team2={ar4[0].team2}/></div></div>
      <div style={{textAlign:'right'}}><button className="btn btn-gold" onClick={handleSave} disabled={saving}>{saving?'Saving…':'💾 Save Results'}</button></div>
    </div>
  );
}

// ── CHANGE PASSWORD ──
function ChangePasswordModal({user,onSave,onClose}){
  const [f,setF]=useState({cur:'',next:'',conf:''});const [err,setErr]=useState('');const [saving,setSaving]=useState(false);
  async function submit(){if(f.cur!==user.password){setErr('Current password incorrect.');return;}if(f.next.length<4){setErr('Min 4 characters.');return;}if(f.next!==f.conf){setErr("Passwords don't match.");return;}setSaving(true);await onSave(f.next);setSaving(false);}
  return(<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal"><div className="modal-title">🔑 Change Password</div>{err&&<Alert type="danger">{err}</Alert>}<div className="form-group"><label className="form-label">Current Password</label><input className="form-input" type="password" value={f.cur} onChange={e=>setF({...f,cur:e.target.value})} autoFocus/></div><div className="form-group"><label className="form-label">New Password</label><input className="form-input" type="password" value={f.next} onChange={e=>setF({...f,next:e.target.value})}/></div><div className="form-group"><label className="form-label">Confirm Password</label><input className="form-input" type="password" value={f.conf} onChange={e=>setF({...f,conf:e.target.value})}/></div><div className="modal-actions"><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-gold" onClick={submit} disabled={saving}>{saving?'Saving…':'Change Password'}</button></div></div></div>);
}

// ── APP ROOT ──
function App(){
  const [appState,setAppState]=useState('checking'); // 'checking'|'unconfigured'|'ready'
  const [data,setData]=useState(null);
  const [currentPool,setCurrentPool]=useState(null);
  const [currentUser,setCurrentUser]=useState(null);
  const [view,setView]=useState('pool');

  async function loadData(poolId){
    try{
      const d = await dbLoadAll(poolId);
      setData(d);
      return d;
    }catch(e){ console.error(e); return null; }
  }

  useEffect(()=>{
    if(SUPABASE_URL==='YOUR_SUPABASE_URL'||SUPABASE_KEY==='YOUR_SUPABASE_ANON_KEY'){
      setAppState('unconfigured'); return;
    }
    setAppState('ready');
  },[]);

  async function handleLogin(pool){
    setCurrentPool(pool);
    await loadData(pool.id);
  }

  async function handleRefresh(){
    if(!currentPool) return;
    const d = await loadData(currentPool.id);
    if(d && currentUser){
      const refreshedUser = d.users.find(u=>u.id===currentUser.id);
      if(refreshedUser) setCurrentUser(refreshedUser);
    }
  }

  function handleProfileSelect(user){
    const needsPicks = !user.picks && data?.bracket?.status === 'open';
    setCurrentUser(user);
    setView(needsPicks ? 'picks' : 'pool');
  }

  function handleSwitchProfile(){ setCurrentUser(null); }

  function handleSignOut(){ setCurrentPool(null); setCurrentUser(null); setData(null); }

  async function handleAddProfile(userData){
    const created = await dbCreateUser({...userData, pool_id: currentPool.id});
    await loadData(currentPool.id);
    return created;
  }

  async function handleSavePicks(picks){
    await dbSavePicks(currentUser.id, picks);
    await handleRefresh();
    setView('pool');
  }

  if(appState==='checking') return <Spinner message="Connecting to database…"/>;
  if(appState==='unconfigured') return <NotConfigured/>;
  if(!currentPool) return <PoolSelectPage onLogin={handleLogin}/>;
  if(!data) return <Spinner message="Loading pool…"/>;
  if(!currentUser) return <ProfileSelectPage users={data.users||[]} onSelect={handleProfileSelect} onSignOut={handleSignOut} onAdd={handleAddProfile}/>;

  const liveUser = data?.users?.find(u=>u.id===currentUser.id) || currentUser;
  const needsPicks = !liveUser.picks && data?.bracket?.status === 'open';

  return(
    <>
      <NavBar user={liveUser} view={view} setView={setView} onSwitchProfile={handleSwitchProfile} onSignOut={handleSignOut} needsPicks={needsPicks}/>
      {view==='pool'          &&<PoolView          user={liveUser} data={data} onRefresh={handleRefresh} onGoToPicks={()=>setView('picks')}/>}
      {view==='picks'         &&<MyPicksPage        user={liveUser} data={data} onSavePicks={handleSavePicks}/>}
      {view==='manage-users'  &&liveUser.is_admin&&<ManageUsersPage  data={data} onRefresh={handleRefresh}/>}
      {view==='bracket-setup' &&liveUser.is_admin&&<BracketSetupPage data={data} onRefresh={handleRefresh}/>}
      {view==='results'       &&liveUser.is_admin&&<ResultsPage      data={data} onRefresh={handleRefresh}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
