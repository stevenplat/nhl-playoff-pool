async function dbLoadAll() {
  const [usersRes, configRes] = await Promise.all([
    sb.from('pool_users').select('*').order('created_at'),
    sb.from('pool_config').select('*').eq('id', 1).single()
  ]);
  const users   = usersRes.data  || [];
  const config  = configRes.data || { id:1, season:'2026', status:'setup', round1: DEFAULT_ROUND1, results: DEFAULT_RESULTS };
  return {
    users,
    bracket: {
      season:  config.season  || '2026',
      status:  config.status  || 'setup',
      round1:  config.round1  || DEFAULT_ROUND1,
      results: config.results || DEFAULT_RESULTS,
    }
  };
}

async function dbSaveConfig(bracket) {
  await sb.from('pool_config').upsert({
    id: 1,
    season:  bracket.season,
    status:  bracket.status,
    round1:  bracket.round1,
    results: bracket.results,
    updated_at: new Date().toISOString()
  });
}

async function dbSavePicks(userId, picks) {
  await sb.from('pool_users').update({ picks }).eq('id', userId);
}

async function dbCreateUser(user) {
  const { data, error } = await sb.from('pool_users').insert([user]).select().single();
  if (error) throw error;
  return data;

// ── HELPERS ──
function r2Teams(picks, r1cfg) {
  const pw = i => picks?.r1?.[i]?.winner || (r1cfg[i]?.team1 && r1cfg[i]?.team2 ? `${r1cfg[i].team1} / ${r1cfg[i].team2}` : 'TBD');
  return [
    {team1:pw(0),team2:pw(3),conf:'East',label:'East R2 – Series 1'},
    {team1:pw(1),team2:pw(2),conf:'East',label:'East R2 – Series 2'},
    {team1:pw(4),team2:pw(7),conf:'West',label:'West R2 – Series 1'},
    {team1:pw(5),team2:pw(6),conf:'West',label:'West R2 – Series 2'},
  ];
}
function r3Teams(picks) {
  const pw = i => picks?.r2?.[i]?.winner || `R2 Winner ${i+1}`;
  return [{team1:pw(0),team2:pw(1),label:'Eastern Conference Final'},{team1:pw(2),team2:pw(3),label:'Western Conference Final'}];
}
function r4Teams(picks) {
  const pw = i => picks?.r3?.[i]?.winner || (i===0?'East Champion':'West Champion');
  return [{team1:pw(0),team2:pw(1),label:'🏆 Stanley Cup Final'}];
}
function actualR2(br){ const rw=i=>br.results.r1[i]?.winner||`R1 Winner ${i+1}`; return[{team1:rw(0),team2:rw(3),label:'East R2 S1'},{team1:rw(1),team2:rw(2),label:'East R2 S2'},{team1:rw(4),team2:rw(7),label:'West R2 S1'},{team1:rw(5),team2:rw(6),label:'West R2 S2'}];}
function actualR3(br){ const rw=i=>br.results.r2[i]?.winner||`R2 Winner ${i+1}`; return[{team1:rw(0),team2:rw(1),label:'East Conf Final'},{team1:rw(2),team2:rw(3),label:'West Conf Final'}];}
function actualR4(br){ const rw=i=>br.results.r3[i]?.winner||(i===0?'East Champ':'West Champ'); return[{team1:rw(0),team2:rw(1),label:'Stanley Cup Final'}];}

function calcScore(picks, results) {
  if (!picks || !results) return 0; let s = 0;
  [['r1',8],['r2',4],['r3',2],['r4',1]].forEach(([k,n],ri)=>{
    for(let i=0;i<n;i++){const res=results[k]?.[i],pk=picks[k]?.[i]; if(res&&pk&&res.winner&&pk.winner===res.winner){s+=ROUND_PTS[ri];if(pk.length&&res.length&&pk.length===res.length)s+=SERIES_BONUS;}}
  }); return s;
}
function calcMaxAvail(results) {
  let s=0; [['r1',8],['r2',4],['r3',2],['r4',1]].forEach(([k],ri)=>{ results[k]?.forEach(r=>{if(r)s+=ROUND_PTS[ri]+SERIES_BONUS;}); }); return s;
}
function uid(){ return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)+Date.now().toString(36); }

// ── SERIES PICKER ──
function SeriesPicker({label,team1,team2,pick,onChange,disabled,result}){
  if(!team1||!team2)return<div className="matchup"><div className="matchup-header"><span>{label}</span></div><div style={{padding:'16px',color:'var(--text3)',fontSize:'0.83rem'}}>Teams not yet set</div></div>;
  const hasResult=result?.winner;
  function teamClass(t){if(!hasResult)return pick?.winner===t?'selected':'';if(result.winner===t)return 'winner-real';return 'loser-real';}
  function dotClass(t){if(!pick?.winner||pick.winner!==t)return '';if(!hasResult)return 'picked';return result.winner===t?'correct':'wrong';}
  function dotChar(t){if(pick?.winner!==t)return '';if(!hasResult)return '✓';return result.winner===t?'✓':'✕';}
  return(
    <div className="matchup">
      <div className="matchup-header"><span>{label}</span>{hasResult&&<span style={{color:'var(--green)',fontWeight:700,fontSize:'0.72rem'}}>✓ {result.winner} in {result.length}</span>}</div>
      {[team1,team2].map(t=><div key={t} className={`matchup-team ${teamClass(t)}`} onClick={()=>!disabled&&onChange({...pick,winner:t})}><span className="team-name">{t}</span><div className={`pick-dot ${dotClass(t)}`}>{dotChar(t)}</div></div>)}
      {!disabled&&pick?.winner&&<div className="length-picker"><span className="length-label">Games:</span>{[4,5,6,7].map(n=><button key={n} className={`length-btn${pick?.length===n?' active':''}`} onClick={()=>onChange({...pick,length:n})}>{n}</button>)}</div>}
      {disabled&&pick?.winner&&<div className="length-picker"><span className="length-label">Your pick:</span><span style={{color:'var(--text)',fontSize:'0.85rem',fontWeight:600}}>{pick.winner}</span>{pick.length&&<span className="text-dim2 text-xs">in {pick.length}</span>}</div>}
    </div>
  );
}

function ManageUsersPage({data,onRefresh}){

  function openEdit(u){setForm({username:u.username,password:u.password,is_admin:u.is_admin});setErr('');setModal({editUser:u});}
  async function handleSubmit(){
    if(!form.username.trim()){setErr('Username required.');return;}
    if(!form.password||form.password.length<4){setErr('Password must be at least 4 characters.');return;}
    if(data.users.some(u=>u.username.toLowerCase()===form.username.toLowerCase().trim()&&(modal==='add'||u.id!==modal.editUser?.id))){setErr('Username taken.');return;}
    setSaving(true);setErr('');
    try{
      if(modal==='add'){await dbCreateUser({id:uid(),username:form.username.trim(),password:form.password,is_admin:form.is_admin,picks:null,created_at:new Date().toISOString()});setMsg(`"${form.username.trim()}" created.`);}
      else{await dbUpdateUser(modal.editUser.id,{username:form.username.trim(),password:form.password,is_admin:form.is_admin});setMsg(`"${form.username.trim()}" updated.`);}
      await onRefresh();setModal(null);setTimeout(()=>setMsg(''),3000);

  }
  async function handleDelete(u){if(!confirm(`Delete "${u.username}"?`))return;await dbDeleteUser(u.id);await onRefresh();setMsg(`"${u.username}" deleted.`);setTimeout(()=>setMsg(''),3000);}
  async function handleClear(u){if(!confirm(`Clear picks for "${u.username}"?`))return;await dbSavePicks(u.id,null);await onRefresh();setMsg('Picks cleared.');setTimeout(()=>setMsg(''),3000);}
  return(
    <div className="page">
      <div className="page-title">👥 League Members</div>
      {msg&&<Alert type="success">{msg}</Alert>}

        <div className="table-wrap"><table><thead><tr><th>Username</th><th>Password</th><th>Role</th><th>Picks</th><th>Actions</th></tr></thead><tbody>
          {data.users.map(u=>(
            <tr key={u.id}><td style={{fontWeight:600}}>{u.username}</td>
            <td><span style={{background:'var(--bg3)',border:'1px solid var(--border)',padding:'3px 10px',borderRadius:'6px',fontFamily:'monospace',fontSize:'0.82rem',color:'var(--text2)'}}>{u.password}</span></td>
            <td><span className={`badge badge-${u.is_admin?'admin':'user'}`}>{u.is_admin?'Admin':'Member'}</span></td>
            <td>{u.picks?<span style={{color:'var(--green)',fontWeight:600,fontSize:'0.82rem'}}>✓ Submitted</span>:<span className="text-dim2 text-xs">—</span>}</td>
            <td><div className="flex gap-1 flex-wrap"><button className="btn btn-ghost btn-sm" onClick={()=>openEdit(u)}>Edit</button>{u.picks&&<button className="btn btn-ghost btn-sm" onClick={()=>handleClear(u)}>Clear</button>}{u.username!=='admin'&&<button className="btn btn-danger btn-sm" onClick={()=>handleDelete(u)}>Delete</button>}</div></td>
            </tr>
          ))}
        </tbody></table></div>
      </div>
      {modal&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <div className="modal-title">{modal==='add'?'Add New Member':'Edit Member'}</div>
            {err&&<Alert type="danger">{err}</Alert>}
            <div className="form-group"><label className="form-label">Username</label><input className="form-input" value={form.username} onChange={e=>setForm({...form,username:e.target.value})} autoFocus placeholder="e.g. johndoe"/></div>
            <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="text" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Min 4 characters"/></div>
            <div className="form-group flex items-center gap-2"><input type="checkbox" id="iad" checked={form.is_admin} onChange={e=>setForm({...form,is_admin:e.target.checked})} style={{accentColor:'var(--purple)',width:'16px',height:'16px',cursor:'pointer'}}/><label htmlFor="iad" style={{cursor:'pointer',fontSize:'0.88rem',color:'var(--text2)'}}>Admin privileges</label></div>
            <div className="modal-actions"><button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-gold" onClick={handleSubmit} disabled={saving}>{saving?'Saving…':modal==='add'?'Create':'Save Changes'}</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── BRACKET SETUP ──
function BracketSetupPage({data,onRefresh}){
  const [bracket,setBracket]=useState(data.bracket);const [msg,setMsg]=useState('');const [saving,setSaving]=useState(false);
  function setTeam(idx,field,val){setBracket(p=>{const r1=[...p.round1];r1[idx]={...r1[idx],[field]:val};return{...p,round1:r1};});}
  async function handleSave(){setSaving(true);await dbSaveConfig(bracket);await onRefresh();setSaving(false);setMsg('Bracket saved!');setTimeout(()=>setMsg(''),3000);}
  const statusOpts=[{v:'setup',l:'Setup',d:'Not yet open'},{v:'open',l:'Open',d:'Accepting picks'},{v:'locked',l:'Locked',d:'No more picks'},{v:'complete',l:'Complete',d:'Season over'}];
  return(
    <div className="page">
      <div className="page-title">⚙️ Bracket Setup</div>
      {msg&&<Alert type="success">{msg}</Alert>}
      <Alert type="info">Enter the 16 playoff teams. Set status to "Open" when ready.</Alert>
      <div className="card mb-3">
        <div className="card-title">Pool Status</div>
        <div className="flex gap-2 flex-wrap">{statusOpts.map(o=><button key={o.v} onClick={()=>setBracket(p=>({...p,status:o.v}))} style={{background:bracket.status===o.v?'var(--grad-purple)':'var(--bg3)',border:'1px solid',borderColor:bracket.status===o.v?'var(--purple)':'var(--border2)',color:bracket.status===o.v?'#fff':'var(--text2)',padding:'9px 18px',borderRadius:'10px',cursor:'pointer',fontSize:'0.86rem',fontWeight:600,fontFamily:'inherit'}}>{o.l} <span style={{opacity:0.7,fontWeight:400,fontSize:'0.78rem'}}>· {o.d}</span></button>)}</div>
      </div>
      <div className="grid-2">
        <div className="card"><div className="card-title">Eastern Conference — Round 1</div>{[0,1,2,3].map(i=><div key={i} style={{marginBottom:'16px'}}><div className="form-label">East Series {i+1}</div><div className="flex gap-2"><input className="form-input" placeholder="Higher seed" value={bracket.round1[i].team1} onChange={e=>setTeam(i,'team1',e.target.value)}/><input className="form-input" placeholder="Lower seed" value={bracket.round1[i].team2} onChange={e=>setTeam(i,'team2',e.target.value)}/></div></div>)}</div>
        <div className="card"><div className="card-title">Western Conference — Round 1</div>{[4,5,6,7].map((i,n)=><div key={i} style={{marginBottom:'16px'}}><div className="form-label">West Series {n+1}</div><div className="flex gap-2"><input className="form-input" placeholder="Higher seed" value={bracket.round1[i].team1} onChange={e=>setTeam(i,'team1',e.target.value)}/><input className="form-input" placeholder="Lower seed" value={bracket.round1[i].team2} onChange={e=>setTeam(i,'team2',e.target.value)}/></div></div>)}</div>
      </div>
      <div style={{textAlign:'right'}}><button className="btn btn-gold" onClick={handleSave} disabled={saving}>{saving?'Saving…':'💾 Save Bracket'}</button></div>
    </div>
  );
}

// ── RESULTS ──
function ResultsPage({data,onRefresh}){
  const [results,setResults]=useState(data.bracket.results);const [msg,setMsg]=useState('');const [saving,setSaving]=useState(false);
  const {bracket}=data;
  function setResult(round,idx,field,val){setResults(p=>{const n={...p,[round]:[...p[round]]};n[round][idx]={...(n[round][idx]||{}),[field]:field==='length'?parseInt(val)||null:val};return n;});}
  async function handleSave(){setSaving(true);await dbSaveConfig({...bracket,results});await onRefresh();setSaving(false);setMsg('Results saved! Scores updated.');setTimeout(()=>setMsg(''),3000);}
  const ar2=actualR2(bracket);const ar3=actualR3(bracket);const ar4=actualR4(bracket);
  function ResultRow({round,idx,team1,team2,label}){
    const res=results[round]?.[idx]||{};const teams=[team1,team2].filter(t=>t&&!t.includes('Winner')&&!t.includes('Champ'));
    return(<div style={{marginBottom:'12px',padding:'14px',background:'var(--bg3)',borderRadius:'12px',border:'1px solid var(--border)'}}><div className="form-label" style={{marginBottom:'10px'}}>{label}</div><div className="flex gap-2 flex-wrap"><div style={{flex:1,minWidth:'160px'}}><div className="form-label" style={{fontSize:'0.68rem'}}>Winner</div><select className="form-input" value={res.winner||''} onChange={e=>setResult(round,idx,'winner',e.target.value)}><option value="">— Not played —</option>{teams.length>0?teams.map(t=><option key={t} value={t}>{t}</option>):[<option key={team1} value={team1}>{team1}</option>,<option key={team2} value={team2}>{team2}</option>]}</select></div><div style={{width:'110px'}}><div className="form-label" style={{fontSize:'0.68rem'}}>Games</div><select className="form-input" value={res.length||''} onChange={e=>setResult(round,idx,'length',e.target.value)}><option value="">—</option>{[4,5,6,7].map(n=><option key={n} value={n}>{n}</option>)}</select></div></div></div>);
  }
  return(
    <div className="page">
      <div className="page-title">📊 Enter Results</div>
      {msg&&<Alert type="success">{msg}</Alert>}
      <Alert type="info">Enter results as each series finishes. Scores update for all players instantly.</Alert>
      <div className="grid-2"><div className="card"><div className="card-title">Round 1 — East</div>{[0,1,2,3].map(i=><ResultRow key={i} round="r1" idx={i} label={`East Series ${i+1}`} team1={bracket.round1[i].team1} team2={bracket.round1[i].team2}/>)}</div><div className="card"><div className="card-title">Round 1 — West</div>{[4,5,6,7].map((i,n)=><ResultRow key={i} round="r1" idx={i} label={`West Series ${n+1}`} team1={bracket.round1[i].team1} team2={bracket.round1[i].team2}/>)}</div></div>
      <div className="grid-2"><div className="card"><div className="card-title">Round 2 — East</div>{[0,1].map(i=><ResultRow key={i} round="r2" idx={i} label={ar2[i].label} team1={ar2[i].team1} team2={ar2[i].team2}/>)}</div><div className="card"><div className="card-title">Round 2 — West</div>{[2,3].map(i=><ResultRow key={i} round="r2" idx={i} label={ar2[i].label} team1={ar2[i].team1} team2={ar2[i].team2}/>)}</div></div>
      <div className="grid-2"><div className="card"><div className="card-title">Conference Finals</div>{[0,1].map(i=><ResultRow key={i} round="r3" idx={i} label={ar3[i].label} team1={ar3[i].team1} team2={ar3[i].team2}/>)}</div><div className="card"><div className="card-title">Stanley Cup Final</div><ResultRow round="r4" idx={0} label={ar4[0].label} team1={ar4[0].team1} team2={ar4[0].team2}/></div></div>
      <div style={{textAlign:'right'}}><button className="btn btn-gold" onClick={handleSave} disabled={saving}>{saving?'Saving…':'💾 Save Results'}</button></div>
    </div>
  );
}

// ── CHANGE PASSWORD ──
function ChangePasswordModal({user,onSave,onClose}){
  const [f,setF]=useState({cur:'',next:'',conf:''});const [err,setErr]=useState('');const [saving,setSaving]=useState(false);
  async function submit(){if(f.cur!==user.password){setErr('Current password incorrect.');return;}if(f.next.length<4){setErr('Min 4 characters.');return;}if(f.next!==f.conf){setErr("Passwords don't match.");return;}setSaving(true);await onSave(f.next);setSaving(false);}
  return(<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal"><div className="modal-title">🔑 Change Password</div>{err&&<Alert type="danger">{err}</Alert>}<div className="form-group"><label className="form-label">Current Password</label><input className="form-input" type="password" value={f.cur} onChange={e=>setF({...f,cur:e.target.value})} autoFocus/></div><div className="form-group"><label className="form-label">New Password</label><input className="form-input" type="password" value={f.next} onChange={e=>setF({...f,next:e.target.value})}/></div><div className="form-group"><label className="form-label">Confirm Password</label><input className="form-input" type="password" value={f.conf} onChange={e=>setF({...f,conf:e.target.value})}/></div><div className="modal-actions"><button className="btn btn-ghost" onClick={onClose}>Cancel</button><button className="btn btn-gold" onClick={submit} disabled={saving}>{saving?'Saving…':'Change Password'}</button></div></div></div>);
}

// ── APP ROOT ──
function App(){
  const [appState,setAppState]=useState('loading'); // 'loading'|'unconfigured'|'ready'
  const [data,setData]=useState(null);
  const [currentUser,setCurrentUser]=useState(null);
  const [view,setView]=useState('dashboard');
  const [changePw,setChangePw]=useState(false);

  async function loadData(){
    try{
      const d = await dbLoadAll();
      setData(d);
      return d;
    }catch(e){ console.error(e); return null; }
  }

  useEffect(()=>{
    if(SUPABASE_URL==='YOUR_SUPABASE_URL'||SUPABASE_KEY==='YOUR_SUPABASE_ANON_KEY'){
      setAppState('unconfigured'); return;
    }
    loadData().then(d=>{
      if(d) setAppState('ready');
      else setAppState('unconfigured');
    });
  },[]);

  async function handleRefresh(){
    const d = await loadData();
    if(d && currentUser){
      const refreshedUser = d.users.find(u=>u.id===currentUser.id);
      if(refreshedUser) setCurrentUser(refreshedUser);
    }
  }

  async function handleLogin(user){
    setCurrentUser(user); setView('dashboard');
    await handleRefresh();
  }

  function handleLogout(){ setCurrentUser(null); }

  async function handleSavePicks(picks){
    await dbSavePicks(currentUser.id, picks);
    await handleRefresh();
  }

  async function handleChangePassword(newPw){
    await dbUpdateUser(currentUser.id, {password: newPw});
    setChangePw(false);
    await handleRefresh();
  }

  if(appState==='loading') return <Spinner message="Connecting to database…"/>;
  if(appState==='unconfigured') return <NotConfigured/>;
  if(!currentUser) return <LoginPage onLogin={handleLogin}/>;

  const liveUser = data?.users?.find(u=>u.id===currentUser.id) || currentUser;

  return(
    <>
      <NavBar user={liveUser} view={view} setView={setView} onLogout={handleLogout}/>
      {view==='dashboard'     &&<DashboardPage     user={liveUser} data={data} setView={setView} onRefresh={handleRefresh}/>}
      {view==='picks'         &&<MyPicksPage        user={liveUser} data={data} onSavePicks={handleSavePicks}/>}
      {view==='leaderboard'   &&<LeaderboardPage    user={liveUser} data={data}/>}
      {view==='manage-users'  &&liveUser.is_admin&&<ManageUsersPage  data={data} onRefresh={handleRefresh}/>}
      {view==='bracket-setup' &&liveUser.is_admin&&<BracketSetupPage data={data} onRefresh={handleRefresh}/>}
      {view==='results'       &&liveUser.is_admin&&<ResultsPage      data={data} onRefresh={handleRefresh}/>}
      <button className="corner-btn" onClick={()=>setChangePw(true)}>🔑 Change Password</button>
      {changePw&&<ChangePasswordModal user={liveUser} onSave={handleChangePassword} onClose={()=>setChangePw(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
